<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wetter App</title>
  </head>
  <body>
    <div id="weather-app">
      <div class="main-menu">
        <div class="main-menu__heading">
          <h1 class="main-menu__title">Wetter</h1>
          <button class="main-menu__btn-edit">Bearbeiten</button>
        </div>
        <div class="main-menu__search">
          <input type="text" placeholder="Gebe einen Ort ein..." />
        </div>
        <div class="main-menu__search-results">
          <div class="city_column_left">
            <p class="city_name">New York</p>
            <p class="city_country">Amerika</p>
            <p class="city_condition">Bewölkt</p>
          </div>
          <div class="city_column_right">
            <p class="city_temperature">20°C</p>
            <p class="city_min_max_temperature">10°C / 25°C</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
